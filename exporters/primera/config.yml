# HPE Primera Prometheus Exporter — Configuration
# -------------------------------------------------------
# Single-array example:
#
#   python hpe_primera_exporter.py --config config.yaml
#
# All values can also be supplied via environment variables
# by uppercasing the key and prefixing HPE_PRIMERA_
# (e.g. HPE_PRIMERA_HOST, HPE_PRIMERA_PASSWORD)
# but the YAML file takes precedence.

# Port on which the exporter will serve /metrics
exporter_port: 9118

# Define one or more arrays to scrape.
# Each entry maps to a PrimeraCollector instance.
arrays:
  - host: 192.168.1.100          # IP or hostname of the Primera array
    port: 8080                   # WSAPI port (default 8080 for HTTP, 8443 for HTTPS)
    scheme: https                # http or https
    username: monitoring         # WSAPI username (browse / read-only role)
    password: "s3cr3t"           # WSAPI password
    verify_ssl: false            # set true and supply a CA bundle for production
    timeout: 30                  # HTTP request timeout in seconds

  # Second array example:
  # - host: 192.168.1.200
  #   port: 8443
  #   scheme: https
  #   username: monitoring
  #   password: "another_secret"
  #   verify_ssl: false