global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - "/etc/prometheus/rules/*.yml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: "hpe-primera-exporter"
    static_configs:
      - targets: ["hpe-primera-exporter:9118"]

  - job_name: "otel-vcenter"
    static_configs:
      - targets: ["otel-collector:8889"]
    # Optional: relabel to clean up long metric names if needed
    #metric_relabel_configs:
    #  - source_labels: [__name__]
    #    regex: 'vmware_(.*)'
    #    target_label: __name__
    #    replacement: 'vmware_${1}'