version: "3.8"

networks:
  monitoring:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:

services:

  prometheus:
    image: prom/prometheus:${PROMETHEUS_VERSION}
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/rules:/etc/prometheus/rules
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    networks:
      - monitoring

  alertmanager:
    image: prom/alertmanager:${ALERTMANAGER_VERSION}
    container_name: alertmanager
    restart: unless-stopped
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    ports:
      - "9093:9093"
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:${GRAFANA_VERSION}
    container_name: grafana
    restart: unless-stopped
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - monitoring

  node-exporter:
    image: prom/node-exporter:${NODE_EXPORTER_VERSION}
    container_name: node-exporter
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    ports:
      - "9100:9100"
    networks:
      - monitoring

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:${CADVISOR_VERSION}
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    ports:
      - "8080:8080"
    networks:
      - monitoring

  hpe-primera-exporter:
    build: ./exporters/primera
    pull_policy: build
    container_name: hpe-primera-exporter
    command: ["python", "hpe_primera_exporter.py"]
    environment:
      - HPE_PRIMERA_ARRAY_COUNT=${HPE_PRIMERA_ARRAY_COUNT:-1}
      - HPE_PRIMERA_EXPORTER_PORT=9118
      # Array 0
      - HPE_PRIMERA_0_HOST=${HPE_PRIMERA_0_HOST}
      - HPE_PRIMERA_0_PORT=${HPE_PRIMERA_0_PORT:-8080}
      - HPE_PRIMERA_0_SCHEME=${HPE_PRIMERA_0_SCHEME:-https}
      - HPE_PRIMERA_0_USERNAME=${HPE_PRIMERA_0_USERNAME}
      - HPE_PRIMERA_0_PASSWORD=${HPE_PRIMERA_0_PASSWORD}
      - HPE_PRIMERA_0_VERIFY_SSL=${HPE_PRIMERA_0_VERIFY_SSL:-false}
      - HPE_PRIMERA_0_TIMEOUT=${HPE_PRIMERA_0_TIMEOUT:-30}
      # Array 1 (uncomment if needed)
      #- HPE_PRIMERA_1_HOST=${HPE_PRIMERA_1_HOST}
      #- HPE_PRIMERA_1_PORT=${HPE_PRIMERA_1_PORT:-8080}
      #- HPE_PRIMERA_1_SCHEME=${HPE_PRIMERA_1_SCHEME:-https}
      #- HPE_PRIMERA_1_USERNAME=${HPE_PRIMERA_1_USERNAME}
      #- HPE_PRIMERA_1_PASSWORD=${HPE_PRIMERA_1_PASSWORD}
      #- HPE_PRIMERA_1_VERIFY_SSL=${HPE_PRIMERA_1_VERIFY_SSL:-false}
      #- HPE_PRIMERA_1_TIMEOUT=${HPE_PRIMERA_1_TIMEOUT:-30}
    ports:
      - "9118:9118"
    restart: unless-stopped
    networks:
      - monitoring

  otel-collector:
    image: otel/opentelemetry-collector-contrib:${OTEL_VERSION}
    container_name: otel-collector
    restart: unless-stopped
    volumes:
      - ./otel/collector-config.yml:/etc/otelcol-contrib/config.yml:ro
    environment:
      - ESXI_ENDPOINT=${ESXI_ENDPOINT}
      - ESXI_USERNAME=${ESXI_USERNAME}
      - ESXI_PASSWORD=${ESXI_PASSWORD}
    ports:
      - "8888:8888"   # OTel collector internal metrics (optional)
      - "8889:8889"   # Prometheus exporter endpoint  → scraped by Prometheus
    networks:
      - monitoring
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:13133/"]
      interval: 30s
      timeout: 5s
      retries: 3
